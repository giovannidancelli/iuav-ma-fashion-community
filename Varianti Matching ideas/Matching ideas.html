<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matching Ideas — Iuav MA Fashion Community</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red:   #F82428;
  --blue:  #0100E2;
  --white: #ffffff;
  --dark:  #1a1a1a;
  --mono:  'Space Mono', monospace;
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--red);
  font-family: var(--mono);
}

/* NAV */
nav.site-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 2.5rem;
  background: var(--blue);
  border-bottom: 1px solid rgba(1,0,226,0.12);
}
.nav-back {
  font-family: var(--mono); font-size: 0.62rem;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--white); text-decoration: none;
  border-bottom: 0.5px solid rgba(255,255,255,0.5); padding-bottom: 2px;
  transition: color 0.2s;
}
.nav-back:hover { color: rgba(255,255,255,0.6); }
.hamburger {
  background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column; gap: 5px; padding: 4px;
}
.hamburger span { display: block; width: 22px; height: 2px; background: var(--white); }

/* STAGE */
.stage {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  padding-top: 4.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2rem;
}

/* CAROUSEL WINDOW — nasconde le card fuori campo */
.carousel-window {
  overflow: hidden;
  display: flex;
  align-items: center;
  padding: 2rem 0;
}

/* CARDS WRAP */
.cards-wrap {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  will-change: transform;
}

/* CARD */
.card {
  background: var(--white);
  border-radius: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
}
.cards-wrap.pulse .card--center {
  transform: scale(0.88);
  opacity: 0.5;
}
.card--center {
  width: 400px;
  opacity: 1;
  box-shadow: 0 24px 64px rgba(0,0,0,0.28);
}
.card--side {
  width: 310px;
  opacity: 0.6;
  cursor: pointer;
}
.card--side:hover { opacity: 0.8; }

/* PHOTO PLACEHOLDER */
.card-photo {
  background: #b8b8b8;
  flex-shrink: 0;
}
.card--center .card-photo { height: 360px; }
.card--side   .card-photo { height: 278px; }

/* CARD INFO */
.card-info {
  padding: 1.2rem 1.4rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}
.card-name {
  font-family: 'LFT Etica Mono', monospace;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--dark);
  letter-spacing: -0.01em;
  line-height: 1;
}
.card--center .card-name { font-size: 2rem; }
.card--side   .card-name { font-size: 1.4rem; }

.card-city {
  font-family: 'LFT Etica Mono', monospace;
  font-size: 0.68rem;
  color: var(--blue);
  letter-spacing: 0.05em;
  margin-bottom: 0.4rem;
}
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}
.tag {
  font-family: 'LFT Etica Mono', monospace;
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 0.28rem 0.7rem;
  border-radius: 999px;
}

/* ACTION BUTTONS */
.card-actions {
  display: flex;
  justify-content: flex-start;
  gap: 1.2rem;
  margin-top: 1rem;
  padding-top: 0.9rem;
  border-top: 1px solid rgba(1,0,226,0.1);
}
.action-btn {
  width: 50px; height: 50px;
  border-radius: 50%;
  background: var(--blue);
  border: none;
  color: var(--white);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.18s, transform 0.18s;
}
.action-btn:hover { opacity: 0.75; transform: scale(1.1); }

/* ARROW BUTTONS */
.arrow-btn {
  width: 54px; height: 54px;
  border-radius: 50%;
  background: var(--blue);
  border: 1.5px solid var(--blue);
  color: var(--white);
  font-size: 1.25rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.18s, opacity 0.18s;
  font-family: var(--mono);
}
.arrow-btn:hover { opacity: 0.75; }

/* BREADCRUMB */
.breadcrumb {
  position: fixed;
  bottom: 1.5rem; left: 2.5rem;
  font-size: 0.55rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  display: flex; gap: 0.6rem; align-items: center;
  z-index: 10;
}
.breadcrumb a { color: rgba(255,255,255,0.35); text-decoration: none; transition: color 0.2s; }
.breadcrumb a:hover { color: var(--white); }
.breadcrumb span { opacity: 0.4; }

/* MENU OVERLAY */
.menu-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: var(--red);
  display: flex; flex-direction: column;
  padding: 18px 40px 40px;
  transform: translateY(-100%);
  transition: transform 0.4s cubic-bezier(0.77,0,0.18,1);
}
.menu-overlay.open { transform: translateY(0); }
.menu-top {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--blue);
  margin: -18px -40px 0; padding: 18px 40px;
}
.menu-site-name {
  font-family: 'LFT Etica Mono', monospace; font-size: 16px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--white);
}
.menu-close {
  background: none; border: none; cursor: pointer;
  font-family: 'LFT Etica Mono', monospace; font-size: 56px; font-weight: 700;
  color: var(--white); line-height: 1; transition: opacity 0.2s;
}
.menu-close:hover { opacity: 0.6; }
.menu-rule { height: 1px; background: rgba(255,255,255,0.4); margin-bottom: 0; }
.menu-nav { display: flex; flex-direction: column; flex: 1; justify-content: center; }
.menu-item {
  font-family: 'LFT Etica Mono', monospace;
  font-size: clamp(26px, 3.5vw, 48px);
  font-weight: 700; text-transform: uppercase;
  color: var(--white); text-decoration: none;
  padding: 12px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.4);
  transition: background 0.18s, color 0.18s;
  letter-spacing: -0.01em;
}
.menu-item:first-child { border-top: 1px solid rgba(255,255,255,0.4); }
.menu-item:hover { background: var(--white); color: var(--red); }
</style>
</head>
<body>

<nav class="site-nav">
  <a href="../Home.html" class="nav-back">← Home</a>
  <button class="hamburger" id="menuBtn" aria-label="Apri menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- MENU OVERLAY -->
<div class="menu-overlay" id="menuOverlay">
  <div class="menu-top">
    <span class="menu-site-name">Iuav MA Fashion Community</span>
    <button class="menu-close" id="menuClose">✕</button>
  </div>
  <div class="menu-rule"></div>
  <div class="menu-nav">
    <a href="../Home.html"                                          class="menu-item">Home</a>
    <a href="../Varianti living archive/Living archive.html"        class="menu-item">Living Archive</a>
    <a href="../Varianti living archive/Passaparola.html"           class="menu-item">Passaparola</a>
    <a href="../Varianti living archive/IMAC identity.html"         class="menu-item">IMAC Identity</a>
    <a href="../Varianti Join our community /join.html"             class="menu-item">Join our community</a>
    <a href="#"                                                     class="menu-item">Matching ideas</a>
    <a href="../Varianti living archive/Talent Radar.html"          class="menu-item">Talent radar</a>
  </div>
</div>

<!-- STAGE -->
<div class="stage">
  <button class="arrow-btn" id="prevBtn">←</button>
  <div class="cards-wrap" id="cardsWrap">
    <div class="card card--side" id="cardPrev">
      <div class="card-photo"></div>
      <div class="card-info">
        <div class="card-name"></div>
        <div class="card-city"></div>
        <div class="card-tags"></div>
      </div>
    </div>
    <div class="card card--center" id="cardCenter">
      <div class="card-photo"></div>
      <div class="card-info">
        <div class="card-name"></div>
        <div class="card-city"></div>
        <div class="card-tags"></div>
        <div class="card-actions">
          <button class="action-btn" title="No">✕</button>
          <button class="action-btn" title="Match">♥</button>
        </div>
      </div>
    </div>
    <div class="card card--side" id="cardNext">
      <div class="card-photo"></div>
      <div class="card-info">
        <div class="card-name"></div>
        <div class="card-city"></div>
        <div class="card-tags"></div>
      </div>
    </div>
  </div>
  <button class="arrow-btn" id="nextBtn">→</button>
</div>

<!-- BREADCRUMB -->
<div class="breadcrumb">
  <a href="../Home.html">Home</a>
  <span>→</span>
  Matching Ideas
</div>

<script>
const profiles = [
  { name: 'Riccardo', city: 'Venezia', skills: ['Tailoring', 'Videomaking'] },
  { name: 'Sara',      city: 'Venezia', skills: ['Photography', 'Styling'] },
  { name: 'Jessica',   city: 'Venezia', skills: ['Textile Design', 'Knitting'] },
  { name: 'Valentina', city: 'Venezia', skills: ['Accessory', 'Graphic Design'] },
  { name: 'Marco',     city: 'Milano',  skills: ['Tailoring', 'Modeling'] },
  { name: 'Giulia',    city: 'Venezia', skills: ['Photography', 'Knitting'] },
];

const TAG_COLORS = [
  { bg: '#0100E2', tc: '#ffffff' },
];

let current = 0;
const wrap = document.getElementById('cardsWrap');

function mod(n, m) { return ((n % m) + m) % m; }

function fillCard(el, idx) {
  const p = profiles[idx];
  el.querySelector('.card-name').textContent = p.name;
  el.querySelector('.card-city').textContent = p.city;
  const tagsEl = el.querySelector('.card-tags');
  tagsEl.innerHTML = '';
  p.skills.forEach((skill, i) => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = skill;
    const c = TAG_COLORS[i % TAG_COLORS.length];
    span.style.background = c.bg;
    span.style.color = c.tc;
    tagsEl.appendChild(span);
  });
}

function render() {
  fillCard(document.getElementById('cardPrev'),   mod(current - 1, profiles.length));
  fillCard(document.getElementById('cardCenter'), mod(current,     profiles.length));
  fillCard(document.getElementById('cardNext'),   mod(current + 1, profiles.length));
}

function navigate(dir) {
  wrap.classList.add('pulse');
  setTimeout(() => {
    current = mod(current + dir, profiles.length);
    render();
    wrap.classList.remove('pulse');
  }, 220);
}

document.getElementById('prevBtn').addEventListener('click', () => navigate(-1));
document.getElementById('nextBtn').addEventListener('click', () => navigate(1));
document.getElementById('cardPrev').addEventListener('click', () => navigate(-1));
document.getElementById('cardNext').addEventListener('click', () => navigate(1));

render();

const menuBtn     = document.getElementById('menuBtn');
const menuClose   = document.getElementById('menuClose');
const menuOverlay = document.getElementById('menuOverlay');
menuBtn.addEventListener('click',   () => menuOverlay.classList.add('open'));
menuClose.addEventListener('click', () => menuOverlay.classList.remove('open'));
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') menuOverlay.classList.remove('open');
});
</script>
</body>
</html>
