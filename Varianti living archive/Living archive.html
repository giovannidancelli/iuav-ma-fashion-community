<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Archive — Iuav MA Fashion Community</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #FFF4B6; }
canvas { display: block; width: 100vw; height: 100vh; position: relative; z-index: 0; }

/* NAV */
nav.site-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 2.5rem;
  background: #0100E2;
  border-bottom: 1px solid rgba(255,255,255,0.18);
}
.nav-back {
  font-family: 'LFT Etica Mono', monospace; font-size: 0.62rem;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: rgba(255,255,255,0.75); text-decoration: none;
  border-bottom: 0.5px solid rgba(255,255,255,0.35); padding-bottom: 2px;
  transition: color 0.2s;
}
.nav-back:hover { color: #ffffff; }

/* HAMBURGER */
.hamburger {
  background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column; gap: 5px; padding: 4px;
}
.hamburger span {
  display: block; width: 22px; height: 2px; background: #ffffff;
}

/* MENU OVERLAY — bianco al posto del giallo */
.menu-overlay {
  position: fixed; top: 0; right: 0; bottom: 0; left: 0; z-index: 300;
  background: #0100E2;
  display: flex; flex-direction: column;
  padding: 18px 40px 40px;
  transform: translateY(-100%);
  transition: transform 0.4s cubic-bezier(0.77,0,0.18,1);
}
.menu-overlay.open { transform: translateY(0); }

.menu-top {
  display: flex; align-items: center; justify-content: space-between;
  background: #ffffff;
  margin: -18px -40px 0;
  padding: 18px 40px;
}
.menu-site-name {
  font-family: 'LFT Etica Mono', monospace; font-size: 16px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: #0100E2;
}
.menu-close {
  background: none; border: none; cursor: pointer;
  font-family: 'LFT Etica Mono', monospace; font-size: 56px; font-weight: 700;
  color: #0100E2; line-height: 1;
  transition: opacity 0.2s;
}
.menu-close:hover { opacity: 0.6; }

.menu-rule {
  height: 1px; background: rgba(255,255,255,0.65); margin-bottom: 0;
}
.menu-nav {
  display: flex; flex-direction: column; flex: 1;
  justify-content: center;
}
.menu-item {
  font-family: 'LFT Etica Mono', monospace;
  font-size: clamp(26px, 3.5vw, 48px);
  font-weight: 700; text-transform: uppercase;
  color: #ffffff; text-decoration: none;
  padding: 12px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.65);
  transition: background 0.18s, color 0.18s;
  letter-spacing: -0.01em;
}
.menu-item:first-child { border-top: 1px solid rgba(255,255,255,0.65); }
.menu-item:hover { background: #ffffff; color: #0100E2; }
</style>
</head>
<body>

<nav class="site-nav">
  <a href="../Home.html" class="nav-back">← Home</a>
  <button class="hamburger" id="menuBtn" aria-label="Apri menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- MENU OVERLAY -->
<div class="menu-overlay" id="menuOverlay">
  <div class="menu-top">
    <span class="menu-site-name">Iuav MA Fashion Community</span>
    <button class="menu-close" id="menuClose">✕</button>
  </div>
  <div class="menu-rule"></div>
  <div class="menu-nav">
    <a href="../Home.html"                                   class="menu-item">Home</a>
    <a href="#"                                              class="menu-item">Living Archive</a>
    <a href="Passaparola.html"                               class="menu-item">Passaparola</a>
    <a href="IMAC identity.html"                             class="menu-item">IMAC Identity</a>
    <a href="../Varianti Join our community /join.html"      class="menu-item">Join our community</a>
    <a href="../Varianti Matching ideas/Matching ideas.html" class="menu-item">Matching ideas</a>
    <a href="Talent Radar.html"                              class="menu-item">Talent radar</a>
  </div>
</div>

<canvas id="c"></canvas>
<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const BLUE   = '#0100E2';

  const DEFS = [
    { lines:['HERITAGE'],       r: 114, fs: 20, href:'../Varianti heritage/heritage.html' },
    { lines:['MEMORY'],         r: 101, fs: 20 },
    { lines:['DECOLONIALITY'],  r: 124, fs: 17 },
    { lines:['TAILORING'],      r: 104, fs: 20 },
    { lines:['ECOLOGY'],        r: 98,  fs: 20 },
    { lines:['GENDER'],         r: 91,  fs: 20 },
    { lines:['LITERATURE'],     r: 108, fs: 19 },
    { lines:['COMMUNICATION'],  r: 127, fs: 20 },
    { lines:['SUSTAINABILITY'], r: 134, fs: 20 },
    { lines:['POLITICS'],       r: 104, fs: 20 },
    { lines:['EMOTIONS'],       r: 101, fs: 20 },
    { lines:['NATURE'],         r: 94,  fs: 20 },
    { lines:['SPECULATIVE'],    r: 117, fs: 19 },
    { lines:['BODY'],           r: 88,  fs: 21 },
  ];

  let W, H, balls;
  let dragging = null, dragOffX = 0, dragOffY = 0;
  let lastMX = 0, lastMY = 0, mVX = 0, mVY = 0;
  let downX = 0, downY = 0;

  const DAMPING = 0.995, BOUNCE = 0.82, REPULSE = 1.05;
  const MIN_SPD = 0.35, MAX_SPD = 2.4;

  const NAV_H = () => (document.querySelector('nav.site-nav') || {offsetHeight: 56}).offsetHeight;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    if (!balls) initBalls();
    else balls.forEach(b => {
      const top = NAV_H();
      b.x = Math.max(b.r, Math.min(W - b.r, b.x));
      b.y = Math.max(top + b.r, Math.min(H - b.r, b.y));
    });
  }

  function initBalls() {
    // 14 positions spread across the canvas in a loose grid
    const pos = [
      [0.12, 0.18], [0.35, 0.12], [0.60, 0.16], [0.82, 0.22],
      [0.22, 0.42], [0.48, 0.38], [0.74, 0.44],
      [0.10, 0.68], [0.36, 0.65], [0.60, 0.70], [0.84, 0.60],
      [0.20, 0.86], [0.50, 0.88], [0.76, 0.84],
    ];
    const top = NAV_H();
    const usableH = H - top;
    balls = DEFS.map((d, i) => {
      const angle = Math.random() * Math.PI * 2;
      const spd   = MIN_SPD + Math.random() * 1.0;
      return {
        ...d,
        color: BLUE, tc: '#ffffff',
        x: pos[i][0] * W,
        y: top + pos[i][1] * usableH,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        scale: 1, scaleTarget: 1,
      };
    });
  }

  function enforceSpeed(b, i) {
    if (i === dragging) return;
    const spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
    if (spd < MIN_SPD) { const f = MIN_SPD/(spd||0.001); b.vx*=f; b.vy*=f; }
    if (spd > MAX_SPD) { const f = MAX_SPD/spd;           b.vx*=f; b.vy*=f; }
  }

  function resolveCollisions() {
    for (let i = 0; i < balls.length; i++) {
      for (let j = i+1; j < balls.length; j++) {
        const a = balls[i], b = balls[j];
        const dx = b.x-a.x, dy = b.y-a.y;
        const d  = Math.sqrt(dx*dx+dy*dy);
        const mn = (a.r+b.r)*1.012;
        if (d < mn && d > 0.001) {
          const nx = dx/d, ny = dy/d, ov = (mn-d)/2;
          if (dragging!==i){ a.x-=nx*ov; a.y-=ny*ov; }
          if (dragging!==j){ b.x+=nx*ov; b.y+=ny*ov; }
          const dot = (a.vx-b.vx)*nx+(a.vy-b.vy)*ny;
          if (dot > 0) {
            const imp = dot*REPULSE;
            if (dragging!==i){ a.vx-=imp*nx; a.vy-=imp*ny; }
            if (dragging!==j){ b.vx+=imp*nx; b.vy+=imp*ny; }
          }
        }
      }
    }
  }

  function update() {
    balls.forEach((b, i) => {
      if (i === dragging) return;
      b.vx *= DAMPING; b.vy *= DAMPING;
      enforceSpeed(b, i);
      const top = NAV_H();
      b.x += b.vx; b.y += b.vy;
      if (b.x-b.r < 0)        { b.x=b.r;       b.vx= Math.abs(b.vx)*BOUNCE; }
      if (b.x+b.r > W)        { b.x=W-b.r;     b.vx=-Math.abs(b.vx)*BOUNCE; }
      if (b.y-b.r < top)      { b.y=top+b.r;   b.vy= Math.abs(b.vy)*BOUNCE; }
      if (b.y+b.r > H)        { b.y=H-b.r;     b.vy=-Math.abs(b.vy)*BOUNCE; }
    });
    resolveCollisions();
    balls.forEach(b => { b.scale += (b.scaleTarget - b.scale) * 0.1; });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const top = NAV_H();
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, top, W, H - top);
    ctx.clip();
    balls.forEach(b => {
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.scale(b.scale, b.scale);

      ctx.shadowColor   = 'rgba(43,75,222,0.18)';
      ctx.shadowBlur    = b.scaleTarget > 1 ? 44 : 20;
      ctx.shadowOffsetY = b.scaleTarget > 1 ? 16 :  7;

      ctx.beginPath();
      ctx.arc(0, 0, b.r, 0, Math.PI*2);
      ctx.fillStyle = b.color;
      ctx.fill();

      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

      ctx.fillStyle    = b.tc;
      ctx.font         = `700 ${b.fs}px 'LFT Etica Mono', monospace`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      const lh = b.fs * 1.45;
      const sy = -((b.lines.length-1)*lh)/2;
      b.lines.forEach((line, li) => ctx.fillText(line, 0, sy+li*lh));

      ctx.restore();
    });
    ctx.restore();
  }

  function loop() { update(); draw(); requestAnimationFrame(loop); }

  function getXY(e) {
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX, y: src.clientY };
  }
  function hitTest(x, y) {
    for (let i = balls.length-1; i >= 0; i--) {
      const b = balls[i], dx = x-b.x, dy = y-b.y;
      if (dx*dx+dy*dy < b.r*b.r) return i;
    }
    return -1;
  }

  canvas.addEventListener('mousemove', e => {
    const {x,y} = getXY(e);
    mVX = x-lastMX; mVY = y-lastMY; lastMX = x; lastMY = y;
    if (dragging !== null) {
      balls[dragging].x = x-dragOffX; balls[dragging].y = y-dragOffY;
      canvas.style.cursor = 'grabbing';
    } else {
      const h = hitTest(x,y);
      balls.forEach((b,i) => { b.scaleTarget = i===h ? 1.08 : 1; });
      canvas.style.cursor = h >= 0 ? 'grab' : 'default';
    }
  });

  canvas.addEventListener('mousedown', e => {
    const {x,y} = getXY(e);
    downX=x; downY=y;
    const h = hitTest(x,y);
    if (h >= 0) {
      dragging=h; dragOffX=x-balls[h].x; dragOffY=y-balls[h].y;
      balls[h].vx=0; balls[h].vy=0; canvas.style.cursor='grabbing';
    }
  });

  canvas.addEventListener('mouseup', e => {
    if (dragging===null) return;
    const {x,y} = getXY(e);
    const moved = Math.abs(x-downX)+Math.abs(y-downY) > 6;
    if (!moved && balls[dragging].href) {
      window.location.href = balls[dragging].href;
    } else {
      balls[dragging].vx=mVX*0.7; balls[dragging].vy=mVY*0.7;
    }
    dragging=null; canvas.style.cursor='default';
  });

  canvas.addEventListener('mouseleave', () => {
    if (dragging!==null) { balls[dragging].vx=mVX*0.5; balls[dragging].vy=mVY*0.5; dragging=null; }
    balls.forEach(b => { b.scaleTarget=1; }); canvas.style.cursor='default';
  });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const {x,y} = getXY(e);
    downX=x; downY=y; lastMX=x; lastMY=y;
    const h = hitTest(x,y);
    if (h>=0){ dragging=h; dragOffX=x-balls[h].x; dragOffY=y-balls[h].y; balls[h].vx=0; balls[h].vy=0; }
  },{passive:false});

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const {x,y} = getXY(e);
    mVX=x-lastMX; mVY=y-lastMY; lastMX=x; lastMY=y;
    if (dragging!==null){ balls[dragging].x=x-dragOffX; balls[dragging].y=y-dragOffY; }
  },{passive:false});

  canvas.addEventListener('touchend', () => {
    if (dragging===null) return;
    const moved = Math.abs(lastMX-downX)+Math.abs(lastMY-downY) > 8;
    if (!moved && balls[dragging].href) {
      window.location.href = balls[dragging].href;
    } else {
      balls[dragging].vx=mVX*0.7; balls[dragging].vy=mVY*0.7;
    }
    dragging=null;
  });

  window.addEventListener('resize', resize);
  resize();
  loop();
})();
</script>

<script>
  const menuBtn     = document.getElementById('menuBtn');
  const menuClose   = document.getElementById('menuClose');
  const menuOverlay = document.getElementById('menuOverlay');
  menuBtn.addEventListener('click',   () => menuOverlay.classList.add('open'));
  menuClose.addEventListener('click', () => menuOverlay.classList.remove('open'));
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') menuOverlay.classList.remove('open');
  });
</script>
</body>
</html>
