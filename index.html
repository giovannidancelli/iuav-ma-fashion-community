<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMAC — Iuav MA Fashion Community</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: rgb(1, 0, 226);
}

html, body {
  width: 100%;
  height: 100%;
  background: #ffffff;
  font-family: 'LFT Etica Mono', 'Courier New', monospace;
  overflow: hidden;
}

/* ── Menu box ── */
#menu-box {
  position: fixed;
  top: 24px;
  left: 24px;
  padding: 14px 18px 16px;
  color: var(--blue);
  z-index: 10;
}

/* ── Sign in ── */
#sign-in-btn {
  display: block;
  text-align: left;
  width: 100%;
  color: var(--blue);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 4px;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.05em;
  line-height: 1.8;
  font-family: 'LFT Etica Mono', 'Courier New', monospace;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  margin: 0;
}

#sign-in-btn:hover {
  text-decoration: none;
}

#menu-box nav {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

#menu-box nav a {
  color: var(--blue);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 4px;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.05em;
  line-height: 1.8;
}

#menu-box nav a:hover {
  text-decoration: none;
}

/* ── Striscia scorrimento ── */
#marquee-strip {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 600px;
  overflow: hidden;
  pointer-events: none;
}

#marquee-track {
  display: flex;
  width: max-content;
  will-change: transform;
}

#marquee-track img {
  height: 600px;
  width: auto;
  display: block;
  flex-shrink: 0;
  filter: hue-rotate(-20deg) saturate(1.2) brightness(1.1);
}

/* ── Pallini fluttuanti ── */
.bubble {
  position: fixed;
  border-radius: 50%;
  background: radial-gradient(circle, rgb(255, 244, 182) 40%, rgba(255, 244, 182, 0) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-weight: 700;
  letter-spacing: 0.05em;
  line-height: 1.5;
  color: rgb(1, 0, 226);
  cursor: grab;
  user-select: none;
  will-change: transform;
}

.bubble:active { cursor: grabbing; }

#bubble {
  width: 130px;
  height: 130px;
  font-size: 14px;
}

#bubble-large {
  width: 280px;
  height: 280px;
  font-size: 26px;
}

#bubble-logo {
  width: 170px;
  height: 170px;
  background: url('Logo.png') center / contain no-repeat;
}
</style>
</head>
<body>

<!-- Menu box -->
<div id="menu-box">
  <nav>
    <a href="about-us.html">about us</a>
    <button id="sign-in-btn">sign in</button>
    <a href="living-archive.html">living archive</a>
    <a href="lets-network.html">let's network</a>
    <a href="lets-share.html">let's share</a>
  </nav>
</div>

<!-- Striscia scorrimento -->
<div id="marquee-strip">
  <div id="marquee-track">
    <img src="Reference /home immagine scorrimento.jpg" alt="">
  </div>
</div>

<!-- Pallino piccolo: Join the community -->
<div id="bubble" class="bubble">Join the<br>community</div>

<!-- Pallino grande: Iuav 4 Venice -->
<div id="bubble-large" class="bubble">Iuav 4<br>Venice</div>

<!-- Pallino logo: IMAC -->
<div id="bubble-logo" class="bubble"></div>

<script>
// ── Marquee ──
(function () {
  const track = document.getElementById('marquee-track');
  const base  = track.querySelector('img');
  const SPEED = 1.8; // px per frame (sinistra → destra)

  function setup() {
    const imgW = base.offsetWidth;
    if (!imgW) { requestAnimationFrame(setup); return; }

    // Copie sufficienti a riempire 3× la larghezza dello schermo
    const needed = Math.ceil((window.innerWidth * 3) / imgW) + 2;
    for (let i = 1; i < needed; i++) {
      track.appendChild(base.cloneNode(true));
    }

    // Partiamo spostati di -imgW: le immagini coprono già tutto da sx a dx
    let pos = -imgW;
    track.style.transform = `translateX(${pos}px)`;

    function tick() {
      pos += SPEED;
      if (pos >= 0) pos -= imgW; // loop invisibile
      track.style.transform = `translateX(${pos}px)`;
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  if (base.complete && base.naturalWidth) {
    requestAnimationFrame(setup);
  } else {
    base.addEventListener('load', () => requestAnimationFrame(setup));
  }
})();

// ── Bubbles con collisione ──
let W = window.innerWidth;
let H = window.innerHeight;
const DAMPING = 0.995;

const bubbles = [
  {
    el: document.getElementById('bubble'),
    R: 65, SPEED_AUTO: 1.8, SPEED_AFTER: 0.8,
    x: W * 0.65, y: H * 0.45, vx: 0.5, vy: 0.4,
    href: 'https://docs.google.com/forms/d/1r43RdSCZdGPQ5wIet1izcyhZdx0vcn32ODd9NwUcQUY/viewform?edit_requested=true',
    dragging: false, dragOffX: 0, dragOffY: 0,
    lastMX: 0, lastMY: 0, velX: 0, velY: 0, downX: 0, downY: 0,
  },
  {
    el: document.getElementById('bubble-large'),
    R: 140, SPEED_AUTO: 1.2, SPEED_AFTER: 0.4,
    x: W * 0.35, y: H * 0.60, vx: -0.5, vy: 0.4,
    href: 'iuav-4-venice.html',
    dragging: false, dragOffX: 0, dragOffY: 0,
    lastMX: 0, lastMY: 0, velX: 0, velY: 0, downX: 0, downY: 0,
  },
  {
    el: document.getElementById('bubble-logo'),
    R: 85, SPEED_AUTO: 1.0, SPEED_AFTER: 0.5,
    x: W * 0.80, y: H * 0.25, vx: -0.4, vy: 0.6,
    href: null,
    dragging: false, dragOffX: 0, dragOffY: 0,
    lastMX: 0, lastMY: 0, velX: 0, velY: 0, downX: 0, downY: 0,
  },
];

let draggingBubble = null;

function resolvePair(a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const minDist = a.R + b.R;
  if (dist < minDist && dist > 0.001) {
    const nx = dx/dist, ny = dy/dist;
    const overlap = (minDist - dist) / 2;
    if (!a.dragging) { a.x -= nx * overlap; a.y -= ny * overlap; }
    if (!b.dragging) { b.x += nx * overlap; b.y += ny * overlap; }
    const dot = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
    if (dot > 0) {
      if (!a.dragging) { a.vx -= dot * nx; a.vy -= dot * ny; }
      if (!b.dragging) { b.vx += dot * nx; b.vy += dot * ny; }
    }
  }
}

function resolveCollisions() {
  resolvePair(bubbles[0], bubbles[1]);
  resolvePair(bubbles[0], bubbles[2]);
  resolvePair(bubbles[1], bubbles[2]);
}

function loop() {
  bubbles.forEach(b => {
    if (!b.dragging) {
      b.vx *= DAMPING; b.vy *= DAMPING;
      const spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
      if (spd < b.SPEED_AUTO) { const f = b.SPEED_AUTO/(spd||0.001); b.vx*=f; b.vy*=f; }
      b.x += b.vx; b.y += b.vy;
      if (b.x-b.R < 0)  { b.x = b.R;   b.vx =  Math.abs(b.vx); }
      if (b.x+b.R > W)  { b.x = W-b.R; b.vx = -Math.abs(b.vx); }
      if (b.y-b.R < 0)  { b.y = b.R;   b.vy =  Math.abs(b.vy); }
      if (b.y+b.R > H)  { b.y = H-b.R; b.vy = -Math.abs(b.vy); }
    }
    b.el.style.left = (b.x - b.R) + 'px';
    b.el.style.top  = (b.y - b.R) + 'px';
  });
  resolveCollisions();
  requestAnimationFrame(loop);
}

bubbles.forEach(b => {
  b.el.style.cursor = 'grab';
  b.el.addEventListener('mousedown', e => {
    draggingBubble = b; b.dragging = true;
    b.downX = e.clientX; b.downY = e.clientY;
    b.dragOffX = e.clientX - b.x; b.dragOffY = e.clientY - b.y;
    b.lastMX = e.clientX; b.lastMY = e.clientY;
    b.vx = 0; b.vy = 0; e.preventDefault();
  });
  b.el.addEventListener('touchstart', e => {
    const t = e.touches[0]; draggingBubble = b; b.dragging = true;
    b.downX = t.clientX; b.downY = t.clientY;
    b.dragOffX = t.clientX - b.x; b.dragOffY = t.clientY - b.y;
    b.lastMX = t.clientX; b.lastMY = t.clientY;
    b.vx = 0; b.vy = 0; e.preventDefault();
  }, { passive: false });
});

window.addEventListener('mousemove', e => {
  const b = draggingBubble; if (!b) return;
  b.velX = e.clientX - b.lastMX; b.velY = e.clientY - b.lastMY;
  b.lastMX = e.clientX; b.lastMY = e.clientY;
  b.x = Math.max(b.R, Math.min(W-b.R, e.clientX - b.dragOffX));
  b.y = Math.max(b.R, Math.min(H-b.R, e.clientY - b.dragOffY));
});

window.addEventListener('mouseup', e => {
  const b = draggingBubble; if (!b) return;
  const moved = Math.abs(e.clientX - b.downX) + Math.abs(e.clientY - b.downY) > 6;
  b.dragging = false; draggingBubble = null;
  if (!moved && b.href) { window.open(b.href, '_blank'); return; }
  b.vx = b.velX * 0.8; b.vy = b.velY * 0.8;
  const spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
  const cap = spd > b.SPEED_AFTER ? b.SPEED_AFTER/spd : 1;
  b.vx *= cap; b.vy *= cap;
  const spd2 = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
  if (spd2 < 0.3) { const f = 0.3/(spd2||0.001); b.vx*=f; b.vy*=f; }
});

window.addEventListener('touchmove', e => {
  const b = draggingBubble; if (!b) return;
  const t = e.touches[0];
  b.velX = t.clientX - b.lastMX; b.velY = t.clientY - b.lastMY;
  b.lastMX = t.clientX; b.lastMY = t.clientY;
  b.x = Math.max(b.R, Math.min(W-b.R, t.clientX - b.dragOffX));
  b.y = Math.max(b.R, Math.min(H-b.R, t.clientY - b.dragOffY));
  e.preventDefault();
}, { passive: false });

window.addEventListener('touchend', () => {
  const b = draggingBubble; if (!b) return;
  b.dragging = false; draggingBubble = null;
  b.vx = b.velX * 0.8; b.vy = b.velY * 0.8;
  const spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
  if (spd < 0.3) { const f = 0.3/(spd||0.001); b.vx*=f; b.vy*=f; }
});

window.addEventListener('resize', () => { W = window.innerWidth; H = window.innerHeight; });

loop();
</script>
<script src="search.js" data-root=""></script>
</body>
</html>
